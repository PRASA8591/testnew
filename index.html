<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Pro</title>
<script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>

<style>
:root{
--bg:#0f172a; --card:#1e293b; --accent:#3b82f6; --text:#e2e8f0;
}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text)}

/* HIDE */
.hidden{display:none !important}

/* LOGIN */
#loginPage{
height:100vh;display:flex;justify-content:center;align-items:center;
background:linear-gradient(135deg,#020617,#1e3a8a);
}
.login-box{
background:#1e293b;padding:25px;border-radius:12px;width:280px;
}
input,button{width:100%;padding:10px;margin:6px 0;border-radius:8px;border:none}
input{background:#020617;color:#fff}
button{background:var(--accent);color:#fff;cursor:pointer}

/* LOADER */
#loader{
position:fixed;top:0;left:0;width:100%;height:100%;
background:#020617;display:flex;align-items:center;justify-content:center;
font-size:22px;
}

/* APP */
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#020617;padding:10px}
.sidebar button{width:100%;margin:5px 0;background:#1e293b}
.main{flex:1;padding:20px}

/* CARD */
.card{background:var(--card);padding:12px;margin:8px 0;border-radius:10px}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">
<div class="login-box">
<h2>Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg" style="color:red"></p>
</div>
</div>

<!-- LOADING -->

<div id="loader" class="hidden">Loading Dashboard...</div>

<!-- APP -->

<div id="app" class="app hidden">
<div class="sidebar">
<button onclick="go('dashboard')">Dashboard</button>
<button onclick="go('items')">Items</button>
<button onclick="go('users')">Users</button>
<button onclick="logout()">Logout</button>
</div>
<div id="content" class="main"></div>
</div>

<script>

// DB (simple safe)
const db = new Dexie("ERP_CLEAN");
db.version(1).stores({
users:"++id,name,username,password"
});

// INIT
async function initDB(){
let u = await db.users.toArray();
if(u.length===0){
await db.users.add({name:"Admin",username:"admin",password:"123"});
}
}

// LOGIN FLOW (CLEAN)
function login(){
let u = username.value.trim();
let p = password.value.trim();

if(u==="admin" && p==="123"){

// 🔥 STEP 1: hide login
loginPage.classList.add("hidden");

// 🔥 STEP 2: show loader
loader.classList.remove("hidden");

// 🔥 STEP 3: simulate loading + init
setTimeout(async ()=>{
await initDB();

// 🔥 STEP 4: hide loader, show app
loader.classList.add("hidden");
app.classList.remove("hidden");

localStorage.setItem("login",1);

// load dashboard
go("dashboard");

},800);

}else{
msg.innerText="Invalid login";
}
}

// LOGOUT
function logout(){
localStorage.clear();
location.reload();
}

// ROUTER
function go(p){
if(p==="dashboard"){
content.innerHTML=`<h2>Dashboard</h2><div class="card">Welcome</div>`;
}
if(p==="items"){
content.innerHTML=`<h2>Items</h2>`;
}
if(p==="users"){
content.innerHTML=`<h2>Users</h2>`;
}
}

// AUTO LOGIN
if(localStorage.getItem("login")){
loginPage.classList.add("hidden");
loader.classList.remove("hidden");

setTimeout(()=>{
loader.classList.add("hidden");
app.classList.remove("hidden");
go("dashboard");
},500);
}

// ENTER KEY
document.addEventListener("keypress",e=>{
if(e.key==="Enter") login();
});

</script>

</body>
</html>
