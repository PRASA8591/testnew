<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ERP Cloud</title>
<script src="https://unpkg.com/dexie@3/dist/dexie.js"></script>

<style>
:root{
--bg:#0f172a; --card:#1e293b; --accent:#3b82f6; --text:#e2e8f0;
}
body{margin:0;font-family:Segoe UI;background:var(--bg);color:var(--text)}
.hidden{display:none!important}

/* ADV LOGIN */
#loginPage{
height:100vh;display:flex;align-items:center;justify-content:center;
background:linear-gradient(135deg,#020617,#1e3a8a);
}
.login-box{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
padding:30px;border-radius:15px;width:320px;
box-shadow:0 10px 40px rgba(0,0,0,0.5);
}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:8px;border:none}
input{background:#020617;color:#fff}
button{background:var(--accent);color:#fff;cursor:pointer}

/* LOADER */
#loader{
position:fixed;width:100%;height:100%;
background:#020617;display:flex;align-items:center;justify-content:center;
font-size:22px;
}

/* APP */
.app{display:flex;height:100vh}
.sidebar{width:220px;background:#020617;padding:10px}
.sidebar button{width:100%;margin:5px 0;background:#1e293b}
.main{flex:1;padding:20px;overflow:auto}
.card{background:var(--card);padding:12px;margin:8px 0;border-radius:10px}

</style>

</head>

<body>

<!-- LOGIN -->

<div id="loginPage">
<div class="login-box">
<h2>ERP Login</h2>
<input id="username" placeholder="Username">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
<p id="msg" style="color:red"></p>
</div>
</div>

<!-- LOADER -->

<div id="loader" class="hidden">Loading System...</div>

<!-- APP -->

<div id="app" class="app hidden">
<div class="sidebar">
<button onclick="go('#/dashboard')">Dashboard</button>
<button onclick="go('#/pos')">POS</button>
<button onclick="go('#/items')">Items</button>
<button onclick="go('#/users')">Users</button>
<button onclick="go('#/reports')">Reports</button>
<button onclick="logout()">Logout</button>
</div>
<div id="content" class="main"></div>
</div>

<script>

// DB
const db = new Dexie("ERP_GITHUB");
db.version(1).stores({
users:"++id,name,username,password",
items:"++id,name,price,stock",
sales:"++id,total,date"
});

// INIT
async function initDB(){
let u=await db.users.toArray();
if(u.length===0){
await db.users.add({name:"Admin",username:"admin",password:"123"});
}
}

// LOGIN
function login(){
if(username.value==="admin" && password.value==="123"){
loginPage.classList.add("hidden");
loader.classList.remove("hidden");

setTimeout(async ()=>{
await initDB();
loader.classList.add("hidden");
app.classList.remove("hidden");
localStorage.setItem("login",1);

// default route
if(!location.hash) location.hash="#/dashboard";
else route();

},500);

}else msg.innerText="Invalid login";
}

// AUTO LOGIN
if(localStorage.getItem("login")){
loginPage.classList.add("hidden");
loader.classList.remove("hidden");

setTimeout(()=>{
loader.classList.add("hidden");
app.classList.remove("hidden");
route();
},400);
}

// LOGOUT
function logout(){localStorage.clear();location.hash="";location.reload();}

// ROUTER
window.addEventListener("hashchange", route);

function go(path){
location.hash = path;
}

async function route(){
await initDB();

let hash = location.hash || "#/dashboard";
let parts = hash.split("/");

let page = parts[1];
let id = parts[2];

if(page==="users" && id) return openUser(id);
if(page==="items" && id) return openItem(id);

pages[page]?.();
}

// PAGES
const pages={

async dashboard(){
let u=await db.users.count();
let i=await db.items.count();
let s=await db.sales.count();

content.innerHTML=`
<h2>Dashboard</h2>
<div class="card">Users: ${u}</div>
<div class="card">Items: ${i}</div>
<div class="card">Sales: ${s}</div>`;
},

async users(){
let list=await db.users.toArray();

content.innerHTML=`
<h2>Users</h2>
<input id="uname" placeholder="Name">
<input id="uuser" placeholder="Username">
<input id="upass" placeholder="Password">
<button onclick="addUser()">Add</button>
<div id="userList"></div>`;

userList.innerHTML=list.map(u=>
`<div class="card">
${u.name}
<button onclick="go('#/users/${u.id}')">Open</button>
</div>`).join("");
},

async items(){
let list=await db.items.toArray();

content.innerHTML=`
<h2>Items</h2>
<input id="iname" placeholder="Name">
<input id="iprice" placeholder="Price">
<input id="istock" placeholder="Stock">
<button onclick="addItem()">Add</button>
<div id="itemList"></div>`;

itemList.innerHTML=list.map(i=>
`<div class="card">
${i.name}
<button onclick="go('#/items/${i.id}')">Open</button>
</div>`).join("");
},

async pos(){
let items=await db.items.toArray();

content.innerHTML=`
<h2>POS</h2>
<select id="itemSel">${items.map(i=>`<option value=${i.id}>${i.name}</option>`)}</select>
<input id="qty" placeholder="Qty">
<button onclick="addCart()">Add</button>
<div id="cart"></div>
<button onclick="checkout()">Checkout</button>`;
},

reports(){
content.innerHTML=`<h2>Reports</h2>`;
}

};

// OPEN DETAILS
async function openUser(id){
let u=await db.users.get(Number(id));
content.innerHTML=`<h2>${u.name}</h2><p>${u.username}</p>
<button onclick="go('#/users')">Back</button>`;
}

async function openItem(id){
let i=await db.items.get(Number(id));
content.innerHTML=`<h2>${i.name}</h2>
<p>Price: ${i.price}</p>
<p>Stock: ${i.stock}</p>
<button onclick="go('#/items')">Back</button>`;
}

// ADD
async function addUser(){
await db.users.add({name:uname.value,username:uuser.value,password:upass.value});
route();
}
async function addItem(){
await db.items.add({name:iname.value,price:+iprice.value,stock:+istock.value});
route();
}

// POS
let CART=[];
async function addCart(){
let item=await db.items.get(+itemSel.value);
let q=+qty.value;

if(item.stock<q) return alert("Stock low");

CART.push({id:item.id,name:item.name,qty:q,total:item.price*q});
cart.innerHTML=CART.map(c=>`${c.name} x ${c.qty}`).join("<br>");
}

async function checkout(){
for(let c of CART){
let i=await db.items.get(c.id);
i.stock-=c.qty;
await db.items.put(i);
}
CART=[]; route();
}

</script>

</body>
</html>
